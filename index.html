<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: auto; background: #525659; }
        .landing {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            color: #333;
            text-align: center;
            background: #fff;
        }
        .landing code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        #viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
        }
        #viewer canvas {
            display: block;
            max-width: 100%;
            height: auto !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ccc;
            font-family: system-ui, sans-serif;
            font-size: 1.1rem;
        }
        #error-msg {
            display: none;
            color: #ff6b6b;
            text-align: center;
            padding: 2rem;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <script>
        var params = new URLSearchParams(window.location.search);
        var pdfUrl = params.get('url');

        if (!pdfUrl) {
            document.body.innerHTML =
                '<div class="landing"><div>' +
                '<h1>PDF Viewer</h1>' +
                '<p style="margin-top:8px">Append <code>?url=https://example.com/file.pdf</code> to view a PDF.</p>' +
                '</div></div>';
        } else {
            document.body.innerHTML =
                '<div id="loading">Loading PDF...</div>' +
                '<div id="viewer"></div>' +
                '<div id="error-msg"></div>';

            // Load PDF.js legacy build (no ES modules needed)
            var script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
            script.onload = function() {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

                var proxyUrl = '/api/proxy?url=' + encodeURIComponent(pdfUrl);

                pdfjsLib.getDocument(proxyUrl).promise.then(function(pdf) {
                    document.getElementById('loading').style.display = 'none';
                    var viewer = document.getElementById('viewer');
                    var devicePixelRatio = window.devicePixelRatio || 1;

                    var renderPage = function(pageNum) {
                        if (pageNum > pdf.numPages) return;

                        pdf.getPage(pageNum).then(function(page) {
                            var viewport = page.getViewport({ scale: 1 });
                            var screenWidth = Math.min(window.innerWidth - 16, 960);
                            var scale = (screenWidth / viewport.width) * devicePixelRatio;
                            var scaledViewport = page.getViewport({ scale: scale });

                            var canvas = document.createElement('canvas');
                            canvas.width = scaledViewport.width;
                            canvas.height = scaledViewport.height;
                            canvas.style.width = (scaledViewport.width / devicePixelRatio) + 'px';
                            viewer.appendChild(canvas);

                            page.render({
                                canvasContext: canvas.getContext('2d'),
                                viewport: scaledViewport
                            }).promise.then(function() {
                                renderPage(pageNum + 1);
                            });
                        });
                    };

                    renderPage(1);
                }).catch(function(err) {
                    document.getElementById('loading').style.display = 'none';
                    var errorEl = document.getElementById('error-msg');
                    errorEl.style.display = 'block';
                    errorEl.textContent = 'Failed to load PDF. The URL may be invalid or inaccessible.';
                    console.error(err);
                });
            };
            script.onerror = function() {
                document.getElementById('loading').style.display = 'none';
                var errorEl = document.getElementById('error-msg');
                errorEl.style.display = 'block';
                errorEl.textContent = 'Failed to load PDF viewer.';
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>

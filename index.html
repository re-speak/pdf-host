<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs" type="module"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: auto; background: #fff; }
        .landing {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            color: #333;
            text-align: center;
            background: #fff;
        }
        .landing code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        #viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
        }
        #viewer canvas {
            display: block;
            max-width: 100%;
            height: auto !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #666;
            font-family: system-ui, sans-serif;
            font-size: 1.1rem;
        }
        #error-msg {
            display: none;
            color: #ff6b6b;
            text-align: center;
            padding: 2rem;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <script type="module">
        const params = new URLSearchParams(window.location.search);
        const pdfUrl = params.get('url');

        if (!pdfUrl) {
            document.body.innerHTML = `
                <div class="landing">
                    <div>
                        <h1>PDF Viewer</h1>
                        <p style="margin-top:8px">Append <code>?url=https://example.com/file.pdf</code> to view a PDF.</p>
                    </div>
                </div>`;
        } else {
            document.body.innerHTML = `
                <div id="loading">PDF 불러오는 중...</div>
                <div id="viewer"></div>
                <div id="error-msg"></div>`;

            const proxyUrl = '/api/proxy?url=' + encodeURIComponent(pdfUrl);

            const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs');
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';

            try {
                const pdf = await pdfjsLib.getDocument(proxyUrl).promise;
                document.getElementById('loading').style.display = 'none';
                const viewer = document.getElementById('viewer');

                const devicePixelRatio = window.devicePixelRatio || 1;

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1 });

                    // Scale to fit screen width, capped at 2x for sharpness
                    const screenWidth = Math.min(window.innerWidth - 16, 960);
                    const scale = (screenWidth / viewport.width) * devicePixelRatio;
                    const scaledViewport = page.getViewport({ scale });

                    const canvas = document.createElement('canvas');
                    canvas.width = scaledViewport.width;
                    canvas.height = scaledViewport.height;
                    canvas.style.width = (scaledViewport.width / devicePixelRatio) + 'px';
                    viewer.appendChild(canvas);

                    await page.render({
                        canvasContext: canvas.getContext('2d'),
                        viewport: scaledViewport,
                    }).promise;
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                const errorEl = document.getElementById('error-msg');
                errorEl.style.display = 'block';
                errorEl.textContent = 'Failed to load PDF. The URL may be invalid or inaccessible.';
                console.error(err);
            }
        }
    </script>
</body>
</html>
